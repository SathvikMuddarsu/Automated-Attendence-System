<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — FaceAuth</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="auth-page">

  <div class="grid-bg" aria-hidden="true"></div>
  <div class="orb orb-1" aria-hidden="true"></div>

  <div class="auth-container">
    <!-- Back nav -->
    <a href="/" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15,18 9,12 15,6"/></svg>
      Back
    </a>

    <div class="auth-card">
      <div class="card-header">
        <div class="card-icon register-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/>
            <line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/>
          </svg>
        </div>
        <h2>Register Your Face</h2>
        <p>Create an account using facial recognition</p>
      </div>

      <!-- Username input -->
      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          placeholder="Enter your username…"
          maxlength="32"
          autocomplete="off"
        />
      </div>

      <!-- Camera preview -->
      <div class="camera-section">
        <div class="camera-frame" id="cameraFrame">
          <video id="video" autoplay muted playsinline></video>
          <canvas id="canvas" style="display:none;"></canvas>
          <div class="camera-overlay" id="cameraOverlay">
            <div class="face-guide">
              <!-- SVG corner brackets -->
              <div class="corner tl"></div>
              <div class="corner tr"></div>
              <div class="corner bl"></div>
              <div class="corner br"></div>
              <span class="guide-text">Position face here</span>
            </div>
          </div>
          <div class="camera-placeholder" id="cameraPlaceholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
            <p>Camera not started</p>
          </div>
          <!-- Captured image preview -->
          <img id="capturedImg" alt="Captured face" style="display:none;" />
        </div>
      </div>

      <!-- Controls -->
      <div class="btn-group">
        <button class="btn btn-outline" id="btnCamera" onclick="startCamera()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          Start Camera
        </button>
        <button class="btn btn-outline" id="btnCapture" onclick="captureImage()" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M9 3H5a2 2 0 0 0-2 2v4m0 6v4a2 2 0 0 0 2 2h4m6 0h4a2 2 0 0 0 2-2v-4m0-6V5a2 2 0 0 0-2-2h-4"/></svg>
          Capture
        </button>
      </div>

      <button class="btn btn-primary full-width" id="btnRegister" onclick="registerUser()" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        Register Now
      </button>

      <!-- Status message -->
      <div class="status-msg" id="statusMsg" style="display:none;"></div>
    </div>
  </div>

  <script src="/static/js/camera.js"></script>
  <script src="/static/js/register.js"></script>
</body>
</html>
